name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    name: Tests, lint y coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff black

      - name: Run ruff linter
        run: |
          ruff check . || true

      - name: Black format check
        run: |
          black --check . || true

      - name: Prepare results folder
        run: mkdir -p results

      - name: Run tests with coverage
        run: |
          pytest -q --junitxml=results/junit.xml --cov=app --cov-report=xml:coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: results/junit.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
# GitHub Actions CI/CD Pipeline para POE Backend
# Ejecuta tests automatizados, coverage, linting y reportes en cada push/PR
#
# Triggers:
#   - Push a branch develop o main
#   - Pull Requests a develop o main
#   - Manual (workflow_dispatch)
#
# Jobs:
#   1. Lint & Security (ruff, bandit)
#   2. Unit Tests (pytest unit)
#   3. Integration Tests (pytest integration + PostgreSQL service)
#   4. Coverage Report (Codecov upload)
#   5. Performance Tests (Locust - solo en main)

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:  # Permitir ejecución manual

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.0"

jobs:
  # ===========================================================================
  # JOB 1: LINTING Y SECURITY
  # ===========================================================================
  lint-and-security:
    name: 🔍 Lint & Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff bandit safety
      
      - name: 🎨 Run Ruff Linter
        run: |
          ruff check app/ tests/ --output-format=github
        continue-on-error: true  # No detener pipeline por warnings
      
      - name: 🔐 Run Bandit (Security)
        run: |
          bandit -r app/ -f json -o reports/bandit-report.json
          bandit -r app/ -f txt
        continue-on-error: true
      
      - name: 🛡️ Check dependencies for vulnerabilities
        run: |
          safety check --json --output reports/safety-report.json
        continue-on-error: true
      
      - name: 📊 Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/


  # ===========================================================================
  # JOB 2: UNIT TESTS
  # ===========================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-security  # Ejecutar después de lint
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-html
      
      - name: 🧪 Run unit tests
        run: |
          pytest tests/unit/ -v -m unit --cov=app --cov-report=xml:reports/coverage-unit.xml --cov-report=html:reports/htmlcov-unit --html=reports/unit-tests.html --self-contained-html
      
      - name: 📊 Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            reports/unit-tests.html
            reports/htmlcov-unit/
      
      - name: 📈 Upload unit coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage-unit.xml
          flags: unit
          name: unit-coverage
          fail_ci_if_error: false


  # ===========================================================================
  # JOB 3: INTEGRATION TESTS (con PostgreSQL)
  # ===========================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: poe_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5433/poe_test
      JWT_SECRET_KEY: test-secret-key-ci
      JWT_ALGORITHM: HS256
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-html httpx
      
      - name: 🗄️ Run database migrations
        run: |
          # Ejecutar migraciones si existen
          # alembic upgrade head
          # O script de inicialización:
          python recreate_db.py
        continue-on-error: true  # Por si no hay migraciones aún
      
      - name: 🌱 Seed test data
        run: |
          # Cargar datos de prueba
          # python scripts/seed_test_data.py
          echo "Skipping seed - using fixtures"
        continue-on-error: true
      
      - name: 🔗 Run integration tests
        run: |
          pytest tests/integration/ -v -m integration --cov=app --cov-append --cov-report=xml:reports/coverage-integration.xml --cov-report=html:reports/htmlcov-integration --html=reports/integration-tests.html --self-contained-html
      
      - name: 📊 Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            reports/integration-tests.html
            reports/htmlcov-integration/
      
      - name: 📈 Upload integration coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage-integration.xml
          flags: integration
          name: integration-coverage
          fail_ci_if_error: false


  # ===========================================================================
  # JOB 4: E2E TESTS (solo en main - son lentos)
  # ===========================================================================
  e2e-tests:
    name: 🎯 E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'  # Solo en main
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: poe_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5433/poe_test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: 🗄️ Setup database
        run: python recreate_db.py
        continue-on-error: true
      
      - name: 🎯 Run E2E tests
        run: |
          pytest tests/e2e/ -v -m e2e --html=reports/e2e-tests.html --self-contained-html
      
      - name: 📊 Upload E2E results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: reports/e2e-tests.html


  # ===========================================================================
  # JOB 5: COVERAGE COMBINADO
  # ===========================================================================
  coverage-report:
    name: 📊 Combined Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install coverage tools
        run: |
          pip install coverage pytest-cov
      
      - name: 📥 Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts/
      
      - name: 🔀 Combine coverage
        run: |
          coverage combine coverage-artifacts/**/.coverage
          coverage report --precision=2
          coverage html -d reports/htmlcov-combined
          coverage xml -o reports/coverage-combined.xml
        continue-on-error: true
      
      - name: 📈 Upload combined coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage-combined.xml
          flags: combined
          name: combined-coverage
          fail_ci_if_error: false
      
      - name: 💬 Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60


  # ===========================================================================
  # JOB 6: PERFORMANCE TESTS (Locust - solo en main)
  # ===========================================================================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.ref == 'refs/heads/main'  # Solo en main
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: poe_test
        ports:
          - 5433:5432
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install locust
      
      - name: 🚀 Start FastAPI server in background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10  # Esperar que el servidor arranque
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5433/poe_test
      
      - name: ⚡ Run Locust performance tests
        run: |
          locust -f tests/performance/locustfile.py --host=http://localhost:8000 --users=50 --spawn-rate=5 --run-time=2m --headless --csv=reports/locust_stats --html=reports/locust_report.html
      
      - name: 📊 Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: |
            reports/locust_report.html
            reports/locust_stats*.csv


  # ===========================================================================
  # JOB 7: BUILD & VALIDATE
  # ===========================================================================
  build-validation:
    name: 🏗️ Build Validation
    runs-on: ubuntu-latest
    needs: [lint-and-security, unit-tests]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 📦 Validate requirements.txt
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt --dry-run
      
      - name: 🐳 Build Docker image (if Dockerfile exists)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t poe-backend:ci .
          else
            echo "No Dockerfile found, skipping Docker build"
          fi
        continue-on-error: true


  # ===========================================================================
  # JOB FINAL: STATUS SUMMARY
  # ===========================================================================
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-security, unit-tests, integration-tests, coverage-report]
    if: always()
    
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status**: ${{ needs.unit-tests.result == 'success' && needs.integration-tests.result == 'success' && '✅ PASS' || '❌ FAIL' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Security | ${{ needs.lint-and-security.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Report | ${{ needs.coverage-report.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Coverage**: [View Report](https://codecov.io/gh/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Artifacts**: [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
